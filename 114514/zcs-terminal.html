<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZCS 终端</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== 黑蓝配色 ========== */
        [data-theme="black-blue"] {
            --bg-page: #0a0a0c;
            --bg-container: rgba(20, 20, 25, 0.95);
            --bg-panel: rgba(30, 30, 35, 0.8);
            --bg-panel-alt: rgba(25, 25, 30, 0.6);
            --bg-card: rgba(0, 0, 0, 0.4);
            --text-primary: #E8E8E8;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #4A9EFF;
            --accent-dim: rgba(74, 158, 255, 0.3);
            --accent-light: rgba(74, 158, 255, 0.15);
            --border-color: rgba(74, 158, 255, 0.3);
            --border-dim: rgba(74, 158, 255, 0.15);
            --progress-bg: rgba(0, 0, 0, 0.4);
            --progress-fill: #4A9EFF;
            --success: #5DD64A;
            --warning: #FFB84A;
            --danger: #FF4A4A;
        }

        /* ========== 黑金配色 ========== */
        [data-theme="black-gold"] {
            --bg-page: #0a0a0c;
            --bg-container: rgba(20, 20, 25, 0.95);
            --bg-panel: rgba(30, 30, 35, 0.8);
            --bg-panel-alt: rgba(25, 25, 30, 0.6);
            --bg-card: rgba(0, 0, 0, 0.4);
            --text-primary: #E8E8E8;
            --text-secondary: #888888;
            --text-muted: #555555;
            --accent: #D4AF37;
            --accent-dim: rgba(212, 175, 55, 0.3);
            --accent-light: rgba(212, 175, 55, 0.15);
            --border-color: rgba(212, 175, 55, 0.3);
            --border-dim: rgba(212, 175, 55, 0.15);
            --progress-bg: rgba(0, 0, 0, 0.4);
            --progress-fill: #D4AF37;
            --success: #5DD64A;
            --warning: #FFB84A;
            --danger: #FF4A4A;
        }

        /* ========== 白蓝配色 ========== */
        [data-theme="white-blue"] {
            --bg-page: #e8e8ea;
            --bg-container: rgba(250, 250, 250, 0.95);
            --bg-panel: rgba(240, 240, 245, 0.8);
            --bg-panel-alt: rgba(245, 245, 248, 0.6);
            --bg-card: rgba(0, 102, 204, 0.06);
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-muted: #888888;
            --accent: #0066CC;
            --accent-dim: rgba(0, 102, 204, 0.2);
            --accent-light: rgba(0, 102, 204, 0.1);
            --border-color: rgba(0, 102, 204, 0.2);
            --border-dim: rgba(0, 102, 204, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.08);
            --progress-fill: #0066CC;
            --success: #28a745;
            --warning: #cc8800;
            --danger: #cc3333;
        }

        /* ========== 白金配色 ========== */
        [data-theme="white-gold"] {
            --bg-page: #e8e8ea;
            --bg-container: rgba(250, 250, 250, 0.95);
            --bg-panel: rgba(240, 240, 245, 0.8);
            --bg-panel-alt: rgba(245, 245, 248, 0.6);
            --bg-card: rgba(184, 150, 12, 0.06);
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-muted: #888888;
            --accent: #B8960C;
            --accent-dim: rgba(184, 150, 12, 0.2);
            --accent-light: rgba(184, 150, 12, 0.1);
            --border-color: rgba(184, 150, 12, 0.2);
            --border-dim: rgba(184, 150, 12, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.08);
            --progress-fill: #B8960C;
            --success: #28a745;
            --warning: #cc8800;
            --danger: #cc3333;
        }

        /* 白色主题下能量环边框使用深色 */
        [data-theme="white-blue"] .energy-box,
        [data-theme="white-gold"] .energy-box {
            border-color: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Consolas', 'Monaco', 'Courier New', monospace;
            background: var(--bg-page);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        .terminal-container {
            width: 100%;
            max-width: 1000px;
            background: var(--bg-container);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 头部 */
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-dim);
            background: var(--bg-panel);
        }

        .terminal-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
        }

        /* 主体布局 */
        .terminal-body {
            display: grid;
            grid-template-columns: 1fr 240px;
            min-height: 400px;
        }

        /* 左侧能量区域 */
        .energy-section {
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        /* 圆角方形能量条 */
        .energy-box {
            position: relative;
            border-radius: 12px;
            padding: 24px;
            background: transparent;
            border: 8px solid rgba(0, 0, 0, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .energy-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            border: 8px solid transparent;
            border-top-color: var(--accent);
            border-right-color: var(--accent);
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .energy-content {
            position: relative;
            z-index: 1;
        }

        /* 第一行：当前/总容量 | 百分比 */
        .energy-row-1 {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
        }

        .energy-main {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .energy-percent {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent);
            transition: color 0.3s ease;
        }

        /* 第二行：充满时间 */
        .energy-row-2 {
            text-align: center;
            padding: 16px 0;
            margin-bottom: 18px;
        }

        .charge-time-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .charge-time-value {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* 第三行：输入 | 输出 */
        .energy-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .power-card {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 14px;
            text-align: center;
        }

        .power-card-label {
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .power-card-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .power-card-unit {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 2px;
        }

        /* 右侧设备列表 */
        .device-panel {
            padding: 24px;
            background: var(--bg-panel-alt);
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-dim);
        }

        .panel-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .device-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .device-item:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .device-name {
            font-size: 11px;
            color: var(--text-primary);
        }

        .device-switch {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .device-switch.on {
            background: var(--accent);
        }

        .device-switch.off {
            background: var(--progress-bg);
        }

        .device-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-primary);
            transition: all 0.2s ease;
        }

        .device-switch.on::after {
            left: 18px;
        }

        /* 底部协议容量 */
        .protocol-section {
            padding: 12px 20px;
            background: var(--bg-panel-alt);
            border-top: 1px solid var(--border-dim);
        }

        .protocol-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .protocol-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 65px;
        }

        .protocol-values {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 85px;
        }

        .protocol-progress-container {
            flex: 1;
            height: 4px;
            background: var(--progress-bg);
            border-radius: 2px;
            overflow: hidden;
        }

        .protocol-progress-fill {
            height: 100%;
            background: var(--progress-fill);
            transition: width 0.4s ease;
        }

        .protocol-percent {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            min-width: 42px;
            text-align: right;
        }

        /* 警告状态 */
        .energy-percent.warning { color: var(--warning); }
        .energy-percent.danger { color: var(--danger); }
        .energy-box.warning { border-color: rgba(0, 0, 0, 0.8); }
        .energy-box.danger { border-color: rgba(0, 0, 0, 0.8); }
        .energy-box.warning::before { border-top-color: var(--warning); border-right-color: var(--warning); }
        .energy-box.danger::before { border-top-color: var(--danger); border-right-color: var(--danger); }

        @media (max-width: 750px) {
            .terminal-body {
                grid-template-columns: 1fr;
            }
            .energy-section {
                border-bottom: 1px solid var(--border-dim);
            }
            .device-panel {
                border-left: none;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-container" id="terminal" data-theme="black-blue">
        <div class="terminal-header">
            <div class="terminal-title">ZCS 终端</div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span id="statusText">正常</span>
            </div>
        </div>

        <div class="terminal-body">
            <div class="energy-section">
                <div class="energy-box" id="energyBox">
                    <div class="energy-content">
                        <div class="energy-row-1">
                            <div class="energy-main" id="energyValue">-- / -- SE</div>
                            <div class="energy-percent" id="energyPercent">--%</div>
                        </div>

                        <div class="energy-row-2">
                            <div class="charge-time-label">充满时间</div>
                            <div class="charge-time-value" id="chargeTime">--:--:--</div>
                        </div>

                        <div class="energy-row-3">
                            <div class="power-card">
                                <div class="power-card-label">输入</div>
                                <div class="power-card-value" id="inputPower">-- SE/s</div>
                            </div>
                            <div class="power-card">
                                <div class="power-card-label">输出</div>
                                <div class="power-card-value" id="outputPower">-- SE/s</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="device-panel">
                <div class="panel-title">设备列表</div>
                <div class="device-list" id="deviceList"></div>
            </div>
        </div>

        <div class="protocol-section">
            <div class="protocol-row">
                <div class="protocol-label">协议容量</div>
                <div class="protocol-values" id="protocolValues">-- / --</div>
                <div class="protocol-progress-container">
                    <div class="protocol-progress-fill" id="protocolProgress" style="width: 0%"></div>
                </div>
                <div class="protocol-percent" id="protocolPercent">--%</div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            lowEnergyThreshold: 20,
            warningEnergyThreshold: 50,
            apiBaseUrl: 'http://localhost:8080/api',
            pollInterval: 1000, // 1 秒轮询一次
        };

        let state = {
            currentEnergy: null,
            totalCapacity: null,
            inputPower: null,
            outputPower: null,
            protocolUsed: null,
            protocolTotal: null,
            devices: [],
        };

        let pollTimer = null;

        function init() {
            updateDisplay();
            startPolling();
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            
            // 立即获取一次数据
            fetchData();
            
            // 定时轮询
            pollTimer = setInterval(fetchData, CONFIG.pollInterval);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        async function fetchData() {
            try {
                // 获取能量数据
                const energyRes = await fetch(`${CONFIG.apiBaseUrl}/energy`);
                if (energyRes.ok) {
                    const energy = await energyRes.json();
                    window.ZCSTerminal.updateEnergy(energy.current, energy.total);
                }

                // 获取功率数据
                const powerRes = await fetch(`${CONFIG.apiBaseUrl}/power`);
                if (powerRes.ok) {
                    const power = await powerRes.json();
                    window.ZCSTerminal.updatePower(power.input, power.output);
                }

                // 获取协议容量
                const protocolRes = await fetch(`${CONFIG.apiBaseUrl}/protocol`);
                if (protocolRes.ok) {
                    const protocol = await protocolRes.json();
                    window.ZCSTerminal.updateProtocol(protocol.used, protocol.total);
                }

                // 获取设备列表
                const devicesRes = await fetch(`${CONFIG.apiBaseUrl}/devices`);
                if (devicesRes.ok) {
                    const devices = await devicesRes.json();
                    window.ZCSTerminal.updateDevices(devices);
                }

                // 获取配置
                const configRes = await fetch(`${CONFIG.apiBaseUrl}/config`);
                if (configRes.ok) {
                    const config = await configRes.json();
                    window.ZCSTerminal.setTheme(config.theme);
                    window.ZCSTerminal.setStatus(config.status);
                }
            } catch (error) {
                // 静默失败，等待下次轮询
                console.debug('数据获取失败:', error.message);
            }
        }

        function renderDeviceList() {
            const container = document.getElementById('deviceList');
            container.innerHTML = '';
            
            if (!state.devices || state.devices.length === 0) {
                container.innerHTML = '<div style="color:var(--text-secondary);font-size:11px;padding:10px;">暂无设备</div>';
                return;
            }
            
            state.devices.forEach(device => {
                const item = document.createElement('div');
                item.className = 'device-item';
                item.innerHTML = `
                    <span class="device-name">${device.name}</span>
                    <div class="device-switch ${device.enabled ? 'on' : 'off'}" data-device-id="${device.id}"></div>
                `;
                
                item.querySelector('.device-switch').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleDevice(device.id);
                });
                
                container.appendChild(item);
            });
        }

        function toggleDevice(deviceId) {
            const device = state.devices.find(d => d.id === deviceId);
            if (device) {
                device.enabled = !device.enabled;
                renderDeviceList();

                // 通知后端
                fetch(`${CONFIG.apiBaseUrl}/devices/toggle`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({deviceId: deviceId, enabled: device.enabled})
                }).then(res => {
                    if (res.ok) {
                        console.log(`设备 ${deviceId} 已${device.enabled ? '开启' : '关闭'}`);
                    } else {
                        console.error('设备切换失败');
                        // 恢复状态
                        device.enabled = !device.enabled;
                        renderDeviceList();
                    }
                }).catch(err => {
                    console.error('设备切换请求失败:', err);
                    // 恢复状态
                    device.enabled = !device.enabled;
                    renderDeviceList();
                });
            }
        }

        function parseNumeric(str) {
            if (str === null || str === undefined || str === '' || str === '--') return null;
            const num = parseFloat(str);
            return isNaN(num) ? null : num;
        }

        function updateDisplay() {
            const energyBox = document.getElementById('energyBox');
            const percentEl = document.getElementById('energyPercent');

            // 更新能量显示
            if (state.currentEnergy !== null && state.totalCapacity !== null) {
                const current = parseNumeric(state.currentEnergy);
                const total = parseNumeric(state.totalCapacity);
                
                if (current !== null && total !== null && total > 0) {
                    document.getElementById('energyValue').textContent = `${state.currentEnergy} / ${state.totalCapacity} SE`;
                    const percentage = Math.round((current / total) * 100);
                    percentEl.textContent = `${percentage}%`;

                    // 计算充满时间（秒）
                    const input = parseNumeric(state.inputPower);
                    const output = parseNumeric(state.outputPower);
                    const netInput = (input !== null && output !== null) ? (input - output) : 0;
                    
                    if (netInput > 0 && current < total) {
                        const remaining = total - current;
                        const seconds = Math.round(remaining / netInput);
                        const hours = Math.floor(seconds / 3600);
                        const minutes = Math.floor((seconds % 3600) / 60);
                        const secs = seconds % 60;
                        document.getElementById('chargeTime').textContent = 
                            `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    } else if (current >= total) {
                        document.getElementById('chargeTime').textContent = '已充满';
                    } else {
                        document.getElementById('chargeTime').textContent = '--:--:--';
                    }

                    // 警告状态
                    energyBox.classList.remove('warning', 'danger');
                    percentEl.classList.remove('warning', 'danger');
                    if (percentage < CONFIG.lowEnergyThreshold) {
                        energyBox.classList.add('danger');
                        percentEl.classList.add('danger');
                    } else if (percentage < CONFIG.warningEnergyThreshold) {
                        energyBox.classList.add('warning');
                        percentEl.classList.add('warning');
                    }
                } else {
                    document.getElementById('energyValue').textContent = `${state.currentEnergy} / ${state.totalCapacity} G FE`;
                    percentEl.textContent = '--%';
                    document.getElementById('chargeTime').textContent = '--:--:--';
                }
            } else {
                document.getElementById('energyValue').textContent = '-- / -- G FE';
                percentEl.textContent = '--%';
                document.getElementById('chargeTime').textContent = '--:--:--';
            }

            // 更新功率显示
            if (state.inputPower !== null && state.inputPower !== '--') {
                document.getElementById('inputPower').textContent = `${state.inputPower} SE/s`;
            } else {
                document.getElementById('inputPower').textContent = '-- SE/s';
            }

            if (state.outputPower !== null && state.outputPower !== '--') {
                document.getElementById('outputPower').textContent = `${state.outputPower} SE/s`;
            } else {
                document.getElementById('outputPower').textContent = '-- SE/s';
            }

            // 更新协议容量
            if (state.protocolUsed !== null && state.protocolTotal !== null) {
                const protocolUsedNum = parseNumeric(state.protocolUsed);
                const protocolTotalNum = parseNumeric(state.protocolTotal);
                
                if (protocolUsedNum !== null && protocolTotalNum !== null && protocolTotalNum > 0) {
                    const protocolPct = Math.round((protocolUsedNum / protocolTotalNum) * 100);
                    document.getElementById('protocolValues').textContent = `${state.protocolUsed} / ${state.protocolTotal}`;
                    document.getElementById('protocolProgress').style.width = `${protocolPct}%`;
                    document.getElementById('protocolPercent').textContent = `${protocolPct}%`;
                } else {
                    document.getElementById('protocolValues').textContent = `${state.protocolUsed} / ${state.protocolTotal}`;
                    document.getElementById('protocolProgress').style.width = '0%';
                    document.getElementById('protocolPercent').textContent = '--%';
                }
            } else {
                document.getElementById('protocolValues').textContent = '-- / --';
                document.getElementById('protocolProgress').style.width = '0%';
                document.getElementById('protocolPercent').textContent = '--%';
            }
        }

        // ========== 外部 API ==========
        window.ZCSTerminal = {
            // 更新能量数据
            updateEnergy: function(current, total) {
                state.currentEnergy = current;
                state.totalCapacity = total;
                updateDisplay();
            },
            
            // 更新功率数据
            updatePower: function(input, output) {
                state.inputPower = input;
                state.outputPower = output;
                updateDisplay();
            },
            
            // 更新协议容量
            updateProtocol: function(used, total) {
                state.protocolUsed = used;
                state.protocolTotal = total;
                updateDisplay();
            },
            
            // 更新设备列表
            updateDevices: function(devices) {
                state.devices = devices;
                renderDeviceList();
            },
            
            // 设置配色方案
            setTheme: function(theme) {
                const terminal = document.getElementById('terminal');
                const validThemes = ['black-blue', 'black-gold', 'white-blue', 'white-gold'];
                if (validThemes.includes(theme)) {
                    terminal.setAttribute('data-theme', theme);
                }
            },
            
            // 更新状态文本
            setStatus: function(status) {
                document.getElementById('statusText').textContent = status;
            },
            
            // 获取当前状态
            getState: function() {
                return JSON.parse(JSON.stringify(state));
            },
            
            // 切换设备（从外部调用）
            toggleDevice: function(deviceId) {
                toggleDevice(deviceId);
            },
            
            // 设置设备开关回调
            onDeviceToggle: function(callback) {
                window.onDeviceToggle = callback;
            }
        };

        // 初始化
        init();
    </script>
</body>
</html>
